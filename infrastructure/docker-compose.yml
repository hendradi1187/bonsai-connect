services:
  postgres:
    image: postgres:15-alpine
    container_name: bonsai-postgres
    environment:
      POSTGRES_USER: bonsai_user
      POSTGRES_PASSWORD: bonsai_pass
      POSTGRES_DB: bonsai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonsai_user -d bonsai_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bonsai-network

  minio:
    image: minio/minio:latest
    container_name: bonsai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bonsai-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bonsai-backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bonsai_db
      DB_USER: bonsai_user
      DB_PASS: bonsai_pass
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: bonsai-images
      MINIO_USE_SSL: "false"
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - bonsai-network
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: >
      sh -c "npm run dev"

  backend-migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    profiles:
      - tools
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bonsai_db
      DB_USER: bonsai_user
      DB_PASS: bonsai_pass
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: bonsai-images
      MINIO_USE_SSL: "false"
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bonsai-network
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: >
      sh -c "npm run migrate"

volumes:
  postgres_data:
  minio_data:

networks:
  bonsai-network:
    driver: bridge
